<div class="container">
  <div
    class="content"
    [ngClass]="{'light-mode': DarkLightModeService.mode === true, 'dark-mode': DarkLightModeService.mode === false}">
    <img
      src="/assets/Logo.svg"
      alt=""
      id="logo"
      routerLink="/home"
    >
    <ul id="menu" *ngIf="!isLargeScreen">
      <li routerLink="/home"><p>Home</p></li>
      <li routerLink="/services"><p>Services</p></li>
      <li routerLink="/about"><p>About</p></li>
      <li routerLink="/contacts"><p>Contacts</p></li>
      <li class="theme-container" (click)="DarkLightModeService.toggleMode()" >
        <div class="theme light">
          <img src="/assets/icon/light.svg" alt="">
        </div>
        <div class="theme dark">
          <img src="/assets/icon/dark.svg" alt="">
        </div>
      </li>
      <li class="theme-mobile" *ngIf="isMenuActive" (click)="DarkLightModeService.toggleMode(); switchMode();">
        <p>{{menu_mode}}</p>
      </li>
    </ul>
    <div id="mail" *ngIf="!isLargeScreen && !isMenuActive" routerLink="/contacts">
      <img src="/assets/icon/mail.svg" alt="">
    </div>

    <div
      id="mobile-menu"
      *ngIf="isLargeScreen || isMenuActive"
      (click)="openMenu();"
      >
      <img src="/assets/icon/{{menu_icon}}.svg" alt="">
    </div>

  </div>
</div>
