	  <!-- Iubenda (Cookie Solution) -->
	  <script>
	    (function () {
	      // Define config BEFORE the Iubenda script loads (via our snippet or GTM).
	      if (window._iub_cs_configuration) return;

	      function detectLang() {
	        try {
	          var lng = localStorage.getItem('i18nextLng') || '';
	          if (String(lng).toLowerCase().startsWith('it')) return 'it';
	          if (String(lng).toLowerCase().startsWith('en')) return 'en';
	        } catch (e) { }
	        var nav = (navigator && navigator.language) ? navigator.language : '';
	        return String(nav).toLowerCase().startsWith('it') ? 'it' : 'en';
	      }

	      var rawSiteId = '%VITE_IUBENDA_SITE_ID%';
	      var rawPolicyId = '%VITE_IUBENDA_COOKIE_POLICY_ID%';

	      var cfg = { lang: detectLang() };
	      if (rawSiteId && rawSiteId.indexOf('%') === -1) cfg.siteId = Number(rawSiteId);
	      if (rawPolicyId && rawPolicyId.indexOf('%') === -1) cfg.cookiePolicyId = Number(rawPolicyId);

	      window._iub_cs_configuration = cfg;
	    })();
	  </script>
