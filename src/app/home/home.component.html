<main class="maintenance" [ngClass]="{'light-mode': DarkLightModeService.mode === true, 'dark-mode': DarkLightModeService.mode === false}">
  <section class="shell" aria-label="Sito in aggiornamento">
    <div class="card">
      <div class="status">
        <span class="dot" aria-hidden="true"></span>
        <span>In aggiornamento</span>
      </div>

      <h1>Sito in fase di update</h1>
      <p class="subtitle">
        Sto lavorando a una nuova versione del sito: contenuti, performance e dettagli visivi.
        Torna a trovarmi tra poco.
      </p>

      <div class="cta">
        <a class="primary" [attr.href]="'mailto:' + contactEmail">
          {{ contactEmail }}
        </a>
        <button class="secondary" type="button" (click)="reload()">
          Ricarica
        </button>
      </div>

      <p class="meta">© {{ currentYear }} Mauro Altamura</p>
    </div>
  </section>
</main>
